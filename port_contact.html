<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Contact | Sharan E</title>

<meta name="description" content="Contact Sharan E through the accessible portfolio contact form.">

</head>

<body>

<header>

<nav aria-label="Main Navigation">

<h1>Sharan E</h1>

<ul>
<li><a href="index.html">Home</a></li>
<li><a href="about.html">About</a></li>
<li><a href="projects.html">Projects</a></li>
<li><a href="contact.html" aria-current="page">Contact</a></li>
</ul>

</nav>

</header>

<main>

<section aria-labelledby="contact-title">

<h2 id="contact-title">Contact Me</h2>

<form action="#" method="post" aria-label="Contact Form">

<div>

<label for="name">
Full Name
</label>

<input
type="text"
id="name"
name="name"
required
aria-required="true">

</div>

<div>

<label for="email">
Email Address
</label>

<input
type="email"
id="email"
name="email"
required
aria-required="true">

</div>

<div>

<label for="subject">
Subject
</label>

<input
type="text"
id="subject"
name="subject">

</div>

<div>

<label for="message">
Message
</label>

<textarea
id="message"
name="message"
rows="6"
required
aria-required="true">
</textarea>

</div>

<button type="submit">
Send Message
</button>

</form>

</section>

</main>

<footer>
<p>&copy; 2026 Sharan E</p>
</footer>

</body>
</html>
