<section aria-labelledby="contact-title">
<h2 id="contact-title">Get in touch</h2>

<p>If you'd like to reach out, use the details below or send a quick message.</p>

<ul>
<li><strong>Email:</strong> <a href="mailto:hello@example.com">hello@example.com</a></li>
<li><strong>Phone:</strong> +1 (555) 123-4567</li>
<li><strong>Location:</strong> Springfield, USA</li>
</ul>

<form action="#" method="post" aria-label="Contact form">
  <label for="name">Name</label><br>
  <input id="name" name="name" type="text" placeholder="Your name" style="width:100%;padding:.5rem;margin:.25rem 0;border-radius:4px;border:1px solid rgba(255,255,255,0.08)"><br>
  <label for="email">Email</label><br>
  <input id="email" name="email" type="email" placeholder="you@example.com" style="width:100%;padding:.5rem;margin:.25rem 0;border-radius:4px;border:1px solid rgba(255,255,255,0.08)"><br>
  <label for="message">Message</label><br>
  <textarea id="message" name="message" rows="5" style="width:100%;padding:.5rem;margin:.25rem 0;border-radius:4px;border:1px solid rgba(255,255,255,0.08)"></textarea><br>
  <button type="submit" style="background:var(--accent);color:#fff;padding:.5rem 1rem;border-radius:6px;border:none">Send</button>
</form>

</section>

</main>
