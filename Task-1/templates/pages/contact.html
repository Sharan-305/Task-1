<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact | Sharan E</title>
  <meta name="description" content="Get in touch with Sharan E - Send a message or view contact details">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  {{HEADER}}

  <main id="main-content">
    <div class="contact-container">
      <!-- Contact Info Section -->
      <section class="contact-details-card card" aria-labelledby="contact-heading">
        <h2 id="contact-heading">Get in touch</h2>
        <p>If you have any questions, project inquiries, or just want to say hello, feel free to reach out using the details or the form.</p>
        
        <ul class="contact-list">
          <li class="contact-item">
            <div class="contact-item-icon" aria-hidden="true">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path><polyline points="22,6 12,13 2,6"></polyline></svg>
            </div>
            <div class="contact-item-content">
              <h4>Email</h4>
              <a href="mailto:hello@example.com">hello@example.com</a>
            </div>
          </li>
          <li class="contact-item">
            <div class="contact-item-icon" aria-hidden="true">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"></path></svg>
            </div>
            <div class="contact-item-content">
              <h4>Phone</h4>
              <p>+1 (555) 123-4567</p>
            </div>
          </li>
          <li class="contact-item">
            <div class="contact-item-icon" aria-hidden="true">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></circle><circle cx="12" cy="10" r="3"></circle></svg>
            </div>
            <div class="contact-item-content">
              <h4>Location</h4>
              <p>Chennai, Tamil Nadu, India</p>
            </div>
          </li>
        </ul>
      </section>

      <!-- Contact Form Section -->
      <section class="contact-form-card card" aria-labelledby="form-heading">
        <h3 id="form-heading" style="margin-bottom: 1.5rem;">Send a Message</h3>
        <form action="#" method="post" aria-label="Contact form">
          <div class="form-group">
            <label for="name">Name</label>
            <input id="name" name="name" type="text" class="form-control" placeholder="Your name" required autocomplete="name">
          </div>
          <div class="form-group">
            <label for="email">Email</label>
            <input id="email" name="email" type="email" class="form-control" placeholder="you@example.com" required autocomplete="email">
          </div>
          <div class="form-group" style="margin-bottom: 1.75rem;">
            <label for="message">Message</label>
            <textarea id="message" name="message" class="form-control" placeholder="Write your message here..." required></textarea>
          </div>
          <button type="submit" class="cta-button" style="width: 100%;">Send Message</button>
        </form>
      </section>
    </div>
  </main>

  {{FOOTER}}
</body>
</html>
